name: Publish OG Images
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'images.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: generate
        uses: riceball-tw/goog@v1
        with:
          config: images.json
      - uses: actions/upload-artifact@v4
        with:
          name: og-images
          path: ${{ steps.generate.outputs.artifact_path }}
          if-no-files-found: error
