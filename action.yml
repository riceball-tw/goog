name: "goog - OG Image Generator"
description: "Generate Open Graph social card images using Go templates and headless Chrome"
author: "riceball-tw"
branding:
  icon: "share-2"
  color: "purple"
inputs:
  # Batch config mode
  config:
    description: "Path to JSON config file for batch generation"
    required: false
    default: ""
  # Markdown scanning mode (new)
  scan_markdown:
    description: "Directory to scan for markdown files with ogImage frontmatter"
    required: false
    default: ""
  # Single-image mode flags
  template:
    description: "Path to HTML template file"
    required: false
    default: "templates/og.html"
  title:
    description: "OG title text"
    required: false
    default: "Hello, Open Graph!"
  description:
    description: "OG description text"
    required: false
    default: ""
  tag:
    description: "Tag / category label"
    required: false
    default: "Blog Post"
  site_name:
    description: "Site name shown in footer"
    required: false
    default: "example.com"
  out:
    description: "Output image path (single mode only)"
    required: false
    default: "out/og.png"
  raw:
    description: "Treat template as raw HTML"
    required: false
    default: "false"
  # Global flags
  workers:
    description: "Number of concurrent workers"
    required: false
    default: "4"
  working_directory:
    description: "Repository root directory"
    required: false
    default: "${{ github.workspace }}"
  ignore_patterns:
    description: "Comma-separated glob patterns to ignore (markdown mode)"
    required: false
    default: "README.md"
  artifact_path:
    description: "Directory where generated images are staged for actions/upload-artifact"
    required: false
    default: "goog-artifacts"
  github_token:
    description: "GitHub token for PR comments"
    required: false
    default: "${{ github.token }}"
  post_preview:
    description: "Post PR comment with image preview"
    required: false
    default: "true"
outputs:
  artifact_path:
    description: "Directory containing generated images to upload as a workflow artifact"
  generated_images:
    description: "Newline-separated list of generated image paths"
runs:
  using: "docker"
  image: "Dockerfile"
