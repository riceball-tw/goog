name: Publish OG Images
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'images.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: riceball-tw/goog@v1
        with:
          config: images.json
          commit: "true"
          commit_message: "chore: update OG images [skip ci]"
          github_token: ${{ secrets.GITHUB_TOKEN }}
